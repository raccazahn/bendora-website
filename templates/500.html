{% extends "base.html" %}
{% block title %}500 — Server Error{% endblock %}
{% block content %}
<section style="min-height:80vh;display:flex;align-items:center;justify-content:center;text-align:center;">
  <div>
    <div style="font-size:6rem;font-family:var(--font-display);font-weight:800;background:var(--grad-text);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;">500</div>
    <h1 style="font-size:1.8rem;margin:1rem 0 0.5rem;">Server Error</h1>
    <p style="color:var(--muted);margin-bottom:2rem;">Something went wrong on our end. We're on it.</p>
    <a href="{{ url_for('index') }}" class="btn btn-primary">
      <i class="fa-solid fa-house" aria-hidden="true"></i> Back Home
    </a>
  </div>
</section>
{% endblock %}
